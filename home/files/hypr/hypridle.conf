general {
    lock_cmd = ~/.config/hypr/should-lock.sh && (pidof hyprlock || hyprlock)
    before_sleep_cmd = pidof hyprlock || hyprlock
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# Dim screen after 20 minutes — saves and restores brightness on resume
listener {
    timeout = 1200
    on-timeout = ~/.config/hypr/should-lock.sh && brightnessctl -s set 20%
    on-resume = brightnessctl -r
}

# Lock screen after 30 minutes
listener {
    timeout = 1800
    on-timeout = ~/.config/hypr/should-lock.sh && (pidof hyprlock || hyprlock)
    on-resume = hyprctl dispatch dpms on
}

# Turn off display 1 minute after locking
listener {
    timeout = 1860
    on-timeout = ~/.config/hypr/should-lock.sh && hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
